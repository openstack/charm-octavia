type: charm

parts:
  charm:
    plugin: reactive
    reactive-charm-build-arguments:
      - --verbose
      - --binary-wheels-from-source
    build-packages:
      - tox
      - git
      - python3-dev
      - libffi-dev
      - libssl-dev
      - libxml2-dev
      - libxslt1-dev
      - rustc-1.91
      - cargo-1.91
      - pkg-config
    source: src/
    build-snaps:
      - charm/3.x/stable
    build-environment:
      - CHARM_INTERFACES_DIR: $CRAFT_PROJECT_DIR/interfaces/
      - CHARM_LAYERS_DIR: $CRAFT_PROJECT_DIR/layers/
    override-build: |
      if ! [[ -f /usr/bin/rustc ]]; then ln --symbolic rustc-1.91 /usr/bin/rustc; fi
      if ! [[ -f /usr/bin/cargo ]]; then ln --symbolic cargo-1.91 /usr/bin/cargo; fi
      craftctl default
platforms:
  ubuntu@22.04:amd64:
  ubuntu@22.04:arm64:
  ubuntu@22.04:ppc64el:
  ubuntu@22.04:s390x:
  ubuntu@24.04:amd64:
  ubuntu@24.04:arm64:
  ubuntu@24.04:ppc64el:
  ubuntu@24.04:s390x:
